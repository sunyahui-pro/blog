{% extends "base.html" %}

{% block title %}追加更新 - {{ post.title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card">
                <div class="card-header" style="background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(184, 41, 221, 0.1) 100%); border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding: 20px;">
                    <h3 class="mb-0" style="color: var(--neon-cyan); font-family: Orbitron;">◈ 追加更新</h3>
                    <p class="text-muted mt-2 mb-0">文章: {{ post.title }}</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('post.append_update', id=post.id) }}">
                        <div class="mb-3">
                            <label class="form-label">更新内容</label>
                            <div id="editor-container" style="height: 400px; background: rgba(0,0,0,0.3);"></div>
                            <textarea name="content" id="content" style="display: none;"></textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">添加更新</button>
                            <a href="{{ url_for('post.post_detail', id=post.id) }}" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 初始化 Quill 编辑器
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: '输入更新内容...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'indent': '-1'}, { 'indent': '+1' }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });
    
    // 表单提交前同步内容
    document.querySelector('form').onsubmit = function() {
        document.getElementById('content').value = quill.root.innerHTML;
    };
</script>
{% endblock %}
