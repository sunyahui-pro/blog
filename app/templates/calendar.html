{% extends "base.html" %}

{% block title %}日历{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header" style="background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(184, 41, 221, 0.1) 100%); border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding: 20px;">
                    <h3 class="mb-0" style="color: var(--neon-cyan); font-family: Orbitron;">◈ 系统日历</h3>
                </div>
                <div class="card-body p-4">
                    {{ calendar|safe }}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
