<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}首页{% endblock %} - NEURAL.LOG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">NEURAL.LOG</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link neon-btn" href="/">
                            <span class="neon-icon">◈</span> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link neon-btn" href="/new">
                            <span class="neon-icon">✦</span> 写入
                        </a>
                    </li>
                </ul>
                <form class="d-flex me-3" action="/search" method="GET">
                    <input class="form-control form-control-sm" type="search" name="q" placeholder="搜索...">
                    <button class="btn btn-sm btn-outline-primary ms-2" type="submit">🔍</button>
                </form>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        {% if current_user.is_authenticated %}
                        <a class="nav-link neon-btn" href="/logout">
                            <span class="neon-icon">◉</span> 退出
                        </a>
                        {% else %}
                        <a class="nav-link neon-btn" href="/login">
                            <span class="neon-icon">◉</span> 登录
                        </a>
                        {% endif %}
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <p class="mb-0">&copy; {{ current_year }} // NEURAL.LOG // SYSTEM.ONLINE</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>hljs.highlightAll();</script>
    {% block scripts %}{% endblock %}
</body>
</html>
