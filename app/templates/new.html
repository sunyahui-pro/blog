{% extends "base.html" %}

{% block title %}写文章{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card">
                <div class="card-header" style="background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(184, 41, 221, 0.1) 100%); border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding: 20px;">
                    <h3 class="mb-0" style="color: var(--neon-cyan); font-family: Orbitron;">◈ 写新文章</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('post.new_post') }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">标题</label>
                            <input type="text" class="form-control" id="title" name="title" required placeholder="输入文章标题...">
                        </div>
                        
                        <div class="mb-3">
                            <label for="author" class="form-label">作者</label>
                            <input type="text" class="form-control" id="author" name="author" value="主人" placeholder="作者名称">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">内容</label>
                            <textarea name="content" id="content" class="form-control" rows="10" required placeholder="输入文章内容..."></textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">发布文章</button>
                            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
<script>
    tinymce.init({
        selector: '#content',
        plugins: 'anchor autolink charmap codesample emoticons image link lists media searchreplace table visualblocks wordcount',
        toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | link image media table | align lineheight | numlist bullist indent outdent | emoticons charmap | removeformat',
        height: 400,
        placeholder: '开始写作...'
    });
</script>
{% endblock %}
